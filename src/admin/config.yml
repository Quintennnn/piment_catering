            required: false
            fields:
              - { label: "Nederlands", name: "nl", widget: "string", required: false }
              - { label: "English", name: "en", widget: "string", required: false }

          - { label: "Hero — secundaire link URL", name: "hero_secondary_url", widget: "string", required: false }

          # --- Lunchcafé ---
          - label: "Lunchcafé — klein label"
            name: "lunchcafe_label"
            widget: "object"
            fields:
              - { label: "Nederlands", name: "nl", widget: "string" }
              - { label: "English", name: "en", widget: "string" }

          - label: "Lunchcafé — titel"
