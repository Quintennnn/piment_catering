            fields:
              - { label: "Nederlands", name: "nl", widget: "text" }
              - { label: "English", name: "en", widget: "text" }

          - { label: "Hero — hoofdfoto", name: "hero_image_main", widget: "image" }
          - { label: "Hero — overlap-foto (klein, links-onder)", name: "hero_image_overlap", widget: "image", required: false }

          - label: "Hero — hoofdknop tekst"
