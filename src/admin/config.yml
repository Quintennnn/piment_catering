backend:
  name: git-gateway
  branch: main

media_folder: "src/assets/images"
public_folder: "/assets/images"

collections:

  # ----------------------------------------------------------------------
  # Site-wide settings (logo, contact, address, navigation)
  # ----------------------------------------------------------------------
  - name: "settings"
    label: "Site-instellingen"
    files:
      - label: "Algemeen"
        name: "site"
        file: "src/_data/site.json"
        fields:
          - { label: "Sitenaam", name: "name", widget: "string" }
          - { label: "Tagline (kort)", name: "tagline", widget: "string" }
          - { label: "Footer tekst", name: "footer_text", widget: "text" }

          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Telefoonnummer (zichtbaar)", name: "phone", widget: "string", hint: "bv. 06 1852 0544" }
              - { label: "Telefoonnummer (zonder spaties, voor links)", name: "phone_link", widget: "string", hint: "bv. 0618520544" }
              - { label: "E-mailadres", name: "email", widget: "string" }

          - label: "Adres lunchcafé"
            name: "lunchcafe_address"
            widget: "object"
            fields:
              - { label: "Naam locatie", name: "name", widget: "string" }
              - { label: "Locatie / landgoed", name: "location", widget: "string" }
              - { label: "Straat + huisnummer", name: "street", widget: "string" }
              - { label: "Plaats", name: "city", widget: "string" }
              - { label: "Openingstijden", name: "hours", widget: "string" }

          - label: "Postadres"
            name: "postal_address"
            widget: "object"
            fields:
              - { label: "Straat + huisnummer", name: "street", widget: "string" }
              - { label: "Postcode", name: "postcode", widget: "string" }
              - { label: "Plaats", name: "city", widget: "string" }

          - { label: "KvK-nummer", name: "kvk", widget: "string" }

          - label: "Social media (optioneel)"
            name: "social"
            widget: "object"
            fields:
              - { label: "Facebook URL", name: "facebook", widget: "string", required: false }
              - { label: "Instagram URL", name: "instagram", widget: "string", required: false }

          - label: "Navigatiemenu"
            name: "nav"
            widget: "list"
            summary: "{{fields.label}} → {{fields.url}}"
            fields:
              - { label: "Tekst", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string", hint: "bv. /lunchcafe/" }

  # ----------------------------------------------------------------------
  # Pages
  # ----------------------------------------------------------------------
  - name: "pages"
    label: "Pagina's"
    files:

      - label: "Home"
        name: "home"
        file: "src/index.njk"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "base.njk" }
          - { label: "Browser-titel", name: "title", widget: "string" }
          - { label: "Meta description", name: "description", widget: "text" }

          - label: "Hero (bovenaan)"
            name: "hero"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Klein label", name: "hero_label", widget: "string" }
              - { label: "Titel", name: "hero_title", widget: "string" }
              - { label: "Tekst", name: "hero_text", widget: "text" }
              - { label: "Hoofdfoto (groot)", name: "hero_image_main", widget: "image" }
              - { label: "Overlap-foto (klein, links onderin)", name: "hero_image_overlap", widget: "image", required: false }
              - { label: "Hoofdknop tekst", name: "hero_cta_label", widget: "string" }
              - { label: "Hoofdknop URL", name: "hero_cta_url", widget: "string" }
              - { label: "Secundaire link tekst", name: "hero_secondary_label", widget: "string", required: false }
              - { label: "Secundaire link URL", name: "hero_secondary_url", widget: "string", required: false }

          - label: "Lunchcafé-blok"
            name: "lunchcafe"
            widget: "object"
            fields:
              - { label: "Klein label", name: "lunchcafe_label", widget: "string" }
              - { label: "Titel", name: "lunchcafe_title", widget: "string" }
              - { label: "Tekst", name: "lunchcafe_text", widget: "text" }
              - { label: "Chip / badge tekst", name: "lunchcafe_chip", widget: "string" }
              - label: "Polaroid-rij (3 foto's)"
                name: "lunchcafe_polaroids"
                widget: "list"
                hint: "Voeg 3 foto's toe — ze worden naast elkaar getoond"
                field: { label: "Foto", name: "image", widget: "image" }
              - { label: "Knop tekst", name: "lunchcafe_cta_label", widget: "string" }
              - { label: "Knop URL", name: "lunchcafe_cta_url", widget: "string" }

          - label: "Catering-blok"
            name: "catering"
            widget: "object"
            fields:
              - { label: "Klein label", name: "catering_label", widget: "string" }
              - { label: "Titel", name: "catering_title", widget: "string" }
              - { label: "Tekst", name: "catering_text", widget: "text" }
              - { label: "Foto", name: "catering_image", widget: "image" }
              - { label: "Knop tekst", name: "catering_cta_label", widget: "string" }
              - { label: "Knop URL", name: "catering_cta_url", widget: "string" }

          - label: "Afsluitende uitnodiging (onderaan)"
            name: "closing"
            widget: "object"
            fields:
              - { label: "Klein label", name: "closing_label", widget: "string" }
              - { label: "Titel", name: "closing_title", widget: "string" }
              - { label: "Tekst", name: "closing_text", widget: "text" }
              - { label: "Foto", name: "closing_image", widget: "image" }
              - { label: "Hoofdknop tekst", name: "closing_primary_label", widget: "string" }
              - { label: "Hoofdknop URL", name: "closing_primary_url", widget: "string" }
              - { label: "Tweede knop tekst", name: "closing_secondary_label", widget: "string" }
              - { label: "Tweede knop URL", name: "closing_secondary_url", widget: "string" }
        editor:
          preview: false

      - label: "Lunchcafé"
        name: "lunchcafe"
        file: "src/lunchcafe.njk"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "base.njk" }
          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/lunchcafe/" }
          - { label: "Browser-titel", name: "title", widget: "string" }
          - { label: "Meta description", name: "description", widget: "text" }
          - { label: "Klein label", name: "hero_label", widget: "string" }
          - { label: "Titel", name: "hero_title", widget: "string" }
          - { label: "Hero foto", name: "hero_image", widget: "image" }
          - { label: "Intro tekst", name: "intro", widget: "markdown" }
          - { label: "Intro callout (optioneel)", name: "intro_callout", widget: "string", required: false }
          - { label: "Menu label (bv. tijden)", name: "menu_label", widget: "string" }
          - { label: "Menu titel", name: "menu_title", widget: "string" }
          - label: "Menu legenda"
            name: "menu_legend"
            widget: "list"
            field: { label: "Item", name: "item", widget: "string" }
          - { label: "Keuken-disclaimer", name: "menu_kitchen_note", widget: "string", required: false, hint: "Bijv. opmerking over kruisbesmetting" }
          - { label: "Menu voettekst", name: "menu_footer_note", widget: "string", required: false }
          - { label: "Extra foto (optioneel)", name: "extra_image", widget: "image", required: false }
        editor:
          preview: false

      - label: "Catering"
        name: "catering"
        file: "src/catering.njk"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "base.njk" }
          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/catering/" }
          - { label: "Browser-titel", name: "title", widget: "string" }
          - { label: "Meta description", name: "description", widget: "text" }
          - { label: "Klein label", name: "hero_label", widget: "string" }
          - { label: "Titel", name: "hero_title", widget: "string" }
          - { label: "Intro tekst", name: "hero_intro", widget: "markdown" }
          - label: "Chips (categorieën)"
            name: "chips"
            widget: "list"
            field: { label: "Chip", name: "chip", widget: "string" }
          - label: "Galerij (sfeerimpressies)"
            name: "gallery"
            widget: "list"
            field: { label: "Foto", name: "image", widget: "image" }
          - { label: "Formuliertitel", name: "form_title", widget: "string" }
          - { label: "Formulier intro", name: "form_intro", widget: "text" }
        editor:
          preview: false

      - label: "Over Piment"
        name: "over-piment"
        file: "src/over-piment.njk"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "base.njk" }
          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/over-piment/" }
          - { label: "Browser-titel", name: "title", widget: "string" }
          - { label: "Meta description", name: "description", widget: "text" }
          - { label: "Klein label", name: "hero_label", widget: "string" }
          - { label: "Titel", name: "hero_title", widget: "string" }
          - { label: "Intro citaat", name: "intro", widget: "text" }
          - { label: "Sectie 1 — titel", name: "local_section_title", widget: "string" }
          - { label: "Sectie 1 — tekst", name: "local_section_body", widget: "markdown" }
          - { label: "Sectie 1 — foto", name: "local_section_image", widget: "image" }
          - { label: "Sectie 2 — titel (chef)", name: "chef_section_title", widget: "string" }
          - { label: "Sectie 2 — tekst (chef)", name: "chef_section_body", widget: "markdown" }
          - { label: "Sectie 2 — foto (chef)", name: "chef_section_image", widget: "image" }
          - { label: "Sectie 3 — titel (filosofie)", name: "philosophy_section_title", widget: "string" }
          - { label: "Sectie 3 — tekst (filosofie)", name: "philosophy_section_body", widget: "markdown" }
        editor:
          preview: false

      - label: "Vacatures (intro-tekst)"
        name: "vacatures-page"
        file: "src/vacatures.njk"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "base.njk" }
          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/vacatures/" }
          - { label: "Browser-titel", name: "title", widget: "string" }
          - { label: "Meta description", name: "description", widget: "text" }
          - { label: "Klein label", name: "hero_label", widget: "string" }
          - { label: "Titel", name: "hero_title", widget: "string" }
          - { label: "Intro tekst", name: "hero_text", widget: "text" }
          - { label: "Bericht als er geen vacatures zijn", name: "empty_text", widget: "text" }
        editor:
          preview: false

      - label: "Contact"
        name: "contact"
        file: "src/contact.njk"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "base.njk" }
          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/contact/" }
          - { label: "Browser-titel", name: "title", widget: "string" }
          - { label: "Meta description", name: "description", widget: "text" }
          - { label: "Klein label", name: "hero_label", widget: "string" }
          - { label: "Titel", name: "hero_title", widget: "string" }
          - { label: "Tekst onder titel", name: "hero_text", widget: "text" }
          - { label: "Formuliertitel", name: "form_title", widget: "string" }
          - { label: "Bevestigingsbericht", name: "success_message", widget: "string" }
        editor:
          preview: false

      - label: "Privacyverklaring"
        name: "privacy"
        file: "src/privacyverklaring.njk"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "base.njk" }
          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/privacyverklaring/" }
          - { label: "Browser-titel", name: "title", widget: "string" }
          - { label: "Meta description", name: "description", widget: "text" }
          - { label: "Klein label", name: "hero_label", widget: "string" }
          - { label: "Titel", name: "hero_title", widget: "string" }
          - { label: "Laatst bijgewerkt op", name: "last_updated", widget: "string", required: false }
          - { label: "Inhoud", name: "body", widget: "markdown" }
        editor:
          preview: false

  # ----------------------------------------------------------------------
  # Vacatures (één bestand per vacature)
  # ----------------------------------------------------------------------
  - name: "vacatures"
    label: "Vacatures"
    label_singular: "Vacature"
    folder: "src/_data/vacatures"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    summary: "{{title}}"
    fields:
      - { label: "Functietitel", name: "title", widget: "string" }
      - { label: "Categorie (chip)", name: "category", widget: "string", required: false, hint: "bv. Keuken, Bediening" }
      - { label: "Korte samenvatting", name: "summary", widget: "text", required: false }
      - { label: "Volledige omschrijving", name: "description", widget: "markdown" }
      - { label: "Sollicitatie-instructie", name: "contact_text", widget: "string", required: false, default: "Stuur ons een mail met een korte motivatie en je cv naar pimentcatering@gmail.com" }

  # ----------------------------------------------------------------------
  # Lunch menu (één bestand per categorie)
  # ----------------------------------------------------------------------
  - name: "menu"
    label: "Lunchmenu"
    label_singular: "Menucategorie"
    folder: "src/_data/menu"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    summary: "{{category}}"
    fields:
      - { label: "Categorienaam (bv. Soep, Tosti)", name: "category", widget: "string" }
      - label: "Gerechten"
        name: "items"
        widget: "list"
        summary: "{{fields.name}} – {{fields.price}}"
        fields:
          - { label: "Naam", name: "name", widget: "string" }
          - { label: "Omschrijving", name: "description", widget: "text", required: false }
          - { label: "Prijs", name: "price", widget: "string" }

  # ----------------------------------------------------------------------
  # Reviews / Testimonials
  # ----------------------------------------------------------------------
  - name: "testimonials"
    label: "Reviews (homepage)"
    files:
      - label: "Reviews"
        name: "testimonials"
        file: "src/_data/testimonials.json"
        fields:
          - { label: "Sectietitel", name: "title", widget: "string" }
          - label: "Reviews"
            name: "items"
            widget: "list"
            summary: "{{fields.name}} – {{fields.quote}}"
            fields:
              - { label: "Naam", name: "name", widget: "string" }
              - { label: "Aantal sterren (1-5)", name: "rating", widget: "number", min: 1, max: 5, default: 5 }
              - { label: "Quote", name: "quote", widget: "text" }
