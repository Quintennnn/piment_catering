            name: "hero_label"
            widget: "object"
            fields:
              - { label: "Nederlands", name: "nl", widget: "string" }
              - { label: "English", name: "en", widget: "string" }

          - label: "Titel"
            name: "hero_title"
            widget: "object"
            fields:
              - { label: "Nederlands", name: "nl", widget: "string" }
              - { label: "English", name: "en", widget: "string" }

          - label: "Laatst bijgewerkt op (optioneel)"
            name: "last_updated"
            widget: "object"
            required: false
            fields:
              - { label: "Nederlands", name: "nl", widget: "string", required: false }
              - { label: "English", name: "en", widget: "string", required: false }

          - label: "Inhoud"
            name: "body"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Nederlands", name: "nl", widget: "markdown" }
              - { label: "English", name: "en", widget: "markdown" }
        editor:
          preview: false

  # ----------------------------------------------------------------------
  # Vacatures (één bestand per vacature)
  # ----------------------------------------------------------------------
  - name: "vacatures"
    label: "Vacatures"
    label_singular: "Vacature"
    folder: "src/_data/vacatures"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    summary: "{{title.nl}}"
    fields:
      - label: "Functietitel"
        name: "title"
        widget: "object"
        fields:
          - { label: "Nederlands", name: "nl", widget: "string" }
          - { label: "English", name: "en", widget: "string" }

      - label: "Categorie (chip, optioneel)"
        name: "category"
        widget: "object"
        required: false
        hint: "bv. Keuken / Kitchen"
        fields:
          - { label: "Nederlands", name: "nl", widget: "string", required: false }
          - { label: "English", name: "en", widget: "string", required: false }

      - label: "Korte samenvatting (optioneel)"
        name: "summary"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Nederlands", name: "nl", widget: "text", required: false }
          - { label: "English", name: "en", widget: "text", required: false }

      - label: "Volledige omschrijving"
        name: "description"
        widget: "object"
        collapsed: true
        fields:
          - { label: "Nederlands", name: "nl", widget: "markdown" }
          - { label: "English", name: "en", widget: "markdown" }

      - label: "Sollicitatie-instructie (optioneel)"
        name: "contact_text"
        widget: "object"
        required: false
        fields:
          - { label: "Nederlands", name: "nl", widget: "string", required: false }
          - { label: "English", name: "en", widget: "string", required: false }

  # ----------------------------------------------------------------------
  # Lunch menu (één bestand per categorie)
  # ----------------------------------------------------------------------
  - name: "menu"
    label: "Lunchmenu"
    label_singular: "Menucategorie"
    folder: "src/_data/menu"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    summary: "{{category.nl}}"
    fields:
      - label: "Categorienaam (bv. Soep, Tosti)"
        name: "category"
        widget: "object"
        fields:
          - { label: "Nederlands", name: "nl", widget: "string" }
          - { label: "English", name: "en", widget: "string" }

      - label: "Gerechten"
        name: "items"
        widget: "list"
        summary: "{{fields.name.nl}} – {{fields.price}}"
        fields:
          - label: "Naam"
            name: "name"
            widget: "object"
            fields:
              - { label: "Nederlands", name: "nl", widget: "string" }
              - { label: "English", name: "en", widget: "string" }

          - label: "Omschrijving (optioneel)"
            name: "description"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - { label: "Nederlands", name: "nl", widget: "text", required: false }
              - { label: "English", name: "en", widget: "text", required: false }

          - { label: "Prijs", name: "price", widget: "string" }

  # ----------------------------------------------------------------------
  # Reviews / Testimonials
  # ----------------------------------------------------------------------
  - name: "testimonials"
    label: "Reviews (homepage)"
    files:
      - label: "Reviews"
        name: "testimonials"
        file: "src/_data/testimonials.json"
        fields:
          - label: "Sectietitel"
            name: "title"
            widget: "object"
            fields:
              - { label: "Nederlands", name: "nl", widget: "string" }
              - { label: "English", name: "en", widget: "string" }

          - label: "Reviews"
            name: "items"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Naam", name: "name", widget: "string" }
              - { label: "Aantal sterren (1-5)", name: "rating", widget: "number", min: 1, max: 5, default: 5 }
              - label: "Quote"
                name: "quote"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Nederlands", name: "nl", widget: "text" }
                  - { label: "English", name: "en", widget: "text" }
