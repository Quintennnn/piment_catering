backend:
  name: git-gateway
  branch: main

media_folder: "src/assets/images"
public_folder: "/assets/images"

# Site-wide i18n: side-by-side NL/EN editor with single-file storage
i18n:
  structure: single_file
  locales: [nl, en]
  default_locale: nl

collections:

  # ----------------------------------------------------------------------
  # Site-wide settings (logo, contact, address, navigation)
  # ----------------------------------------------------------------------
  - name: "settings"
    label: "Site-instellingen"
    i18n: true
    files:
      - label: "Algemeen"
        name: "site"
        file: "src/_data/site.json"
        i18n: true
        fields:
          - { label: "Sitenaam", name: "name", widget: "string", i18n: duplicate }
          - { label: "Tagline (kort)", name: "tagline", widget: "string", i18n: true }
          - { label: "Footer tekst", name: "footer_text", widget: "text", i18n: true }

          - label: "Contact"
            name: "contact"
            widget: "object"
            i18n: true
            fields:
              - { label: "Telefoonnummer (zichtbaar)", name: "phone", widget: "string", i18n: duplicate, hint: "bv. 06 1852 0544" }
              - { label: "Telefoonnummer (zonder spaties)", name: "phone_link", widget: "string", i18n: duplicate, hint: "bv. 0618520544" }
              - { label: "E-mailadres", name: "email", widget: "string", i18n: duplicate }

          - label: "Adres lunchcafé"
            name: "lunchcafe_address"
            widget: "object"
            i18n: true
            fields:
              - { label: "Naam locatie", name: "name", widget: "string", i18n: true }
              - { label: "Locatie / landgoed", name: "location", widget: "string", i18n: duplicate }
              - { label: "Straat + huisnummer", name: "street", widget: "string", i18n: duplicate }
              - { label: "Plaats", name: "city", widget: "string", i18n: duplicate }
              - { label: "Openingstijden", name: "hours", widget: "string", i18n: true }

          - label: "Postadres"
            name: "postal_address"
            widget: "object"
            i18n: true
            fields:
              - { label: "Straat + huisnummer", name: "street", widget: "string", i18n: duplicate }
              - { label: "Postcode", name: "postcode", widget: "string", i18n: duplicate }
              - { label: "Plaats", name: "city", widget: "string", i18n: duplicate }

          - { label: "KvK-nummer", name: "kvk", widget: "string", i18n: duplicate }

          - label: "Social media (optioneel)"
            name: "social"
            widget: "object"
            i18n: true
            fields:
              - { label: "Facebook URL", name: "facebook", widget: "string", required: false, i18n: duplicate }
              - { label: "Instagram URL", name: "instagram", widget: "string", required: false, i18n: duplicate }

          - label: "Navigatiemenu"
            name: "nav"
            widget: "list"
            summary: "{{fields.key}} → {{fields.url}}"
            hint: "De zichtbare tekst van de menu-items beheer je in de UI-vertalingen (vraag de developer)."
            fields:
              - { label: "Sleutel", name: "key", widget: "string", hint: "home, lunchcafe, catering, about, vacancies, contact" }
              - { label: "URL", name: "url", widget: "string", hint: "bv. /lunchcafe/" }

  # ----------------------------------------------------------------------
  # Pages
  # ----------------------------------------------------------------------
  - name: "pages"
    label: "Pagina's"
    format: "frontmatter"
    extension: "njk"
    i18n: true
    files:

      - label: "Home"
        name: "home"
        file: "src/index.njk"
        i18n: true
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "base.njk", i18n: duplicate }
          - { label: "Browser-titel", name: "title", widget: "string", i18n: true }
          - { label: "Meta description", name: "description", widget: "text", i18n: true }

          # --- Hero ---
          - { label: "Hero — klein label", name: "hero_label", widget: "string", i18n: true }
          - { label: "Hero — titel", name: "hero_title", widget: "string", i18n: true }
          - { label: "Hero — tekst", name: "hero_text", widget: "text", i18n: true }
          - { label: "Hero — hoofdfoto", name: "hero_image_main", widget: "image", i18n: duplicate }
          - { label: "Hero — overlap-foto (klein, links-onder)", name: "hero_image_overlap", widget: "image", required: false, i18n: duplicate }
          - { label: "Hero — hoofdknop tekst", name: "hero_cta_label", widget: "string", i18n: true }
          - { label: "Hero — hoofdknop URL", name: "hero_cta_url", widget: "string", i18n: duplicate }
          - { label: "Hero — secundaire link tekst", name: "hero_secondary_label", widget: "string", required: false, i18n: true }
          - { label: "Hero — secundaire link URL", name: "hero_secondary_url", widget: "string", required: false, i18n: duplicate }

          # --- Lunchcafé ---
          - { label: "Lunchcafé — klein label", name: "lunchcafe_label", widget: "string", i18n: true }
          - { label: "Lunchcafé — titel", name: "lunchcafe_title", widget: "string", i18n: true }
          - { label: "Lunchcafé — tekst", name: "lunchcafe_text", widget: "text", i18n: true }
          - { label: "Lunchcafé — chip / badge tekst", name: "lunchcafe_chip", widget: "string", i18n: true }
          - label: "Lunchcafé — polaroid-rij (3 foto's)"
            name: "lunchcafe_polaroids"
            widget: "list"
            field: { label: "Foto", name: "image", widget: "image" }
          - { label: "Lunchcafé — knop tekst", name: "lunchcafe_cta_label", widget: "string", i18n: true }
          - { label: "Lunchcafé — knop URL", name: "lunchcafe_cta_url", widget: "string", i18n: duplicate }

          # --- Catering ---
          - { label: "Catering — klein label", name: "catering_label", widget: "string", i18n: true }
          - { label: "Catering — titel", name: "catering_title", widget: "string", i18n: true }
          - { label: "Catering — tekst", name: "catering_text", widget: "text", i18n: true }
          - { label: "Catering — foto", name: "catering_image", widget: "image", i18n: duplicate }
          - { label: "Catering — knop tekst", name: "catering_cta_label", widget: "string", i18n: true }
          - { label: "Catering — knop URL", name: "catering_cta_url", widget: "string", i18n: duplicate }

          # --- Closing CTA ---
          - { label: "Afsluiting — klein label", name: "closing_label", widget: "string", i18n: true }
          - { label: "Afsluiting — titel", name: "closing_title", widget: "string", i18n: true }
          - { label: "Afsluiting — tekst", name: "closing_text", widget: "text", i18n: true }
          - { label: "Afsluiting — foto", name: "closing_image", widget: "image", i18n: duplicate }
          - { label: "Afsluiting — hoofdknop tekst", name: "closing_primary_label", widget: "string", i18n: true }
          - { label: "Afsluiting — hoofdknop URL", name: "closing_primary_url", widget: "string", i18n: duplicate }
          - { label: "Afsluiting — tweede knop tekst", name: "closing_secondary_label", widget: "string", i18n: true }
          - { label: "Afsluiting — tweede knop URL", name: "closing_secondary_url", widget: "string", i18n: duplicate }
        editor:
          preview: false

      - label: "Lunchcafé"
        name: "lunchcafe"
        file: "src/lunchcafe.njk"
        i18n: true
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "base.njk", i18n: duplicate }
          - { label: "Browser-titel", name: "title", widget: "string", i18n: true }
          - { label: "Meta description", name: "description", widget: "text", i18n: true }
          - { label: "Klein label", name: "hero_label", widget: "string", i18n: true }
          - { label: "Titel", name: "hero_title", widget: "string", i18n: true }
          - { label: "Hero foto", name: "hero_image", widget: "image", i18n: duplicate }
          - { label: "Intro tekst", name: "intro", widget: "markdown", i18n: true }
          - { label: "Intro callout (optioneel)", name: "intro_callout", widget: "string", required: false, i18n: true }
          - { label: "Menu label (bv. tijden)", name: "menu_label", widget: "string", i18n: true }
          - { label: "Menu titel", name: "menu_title", widget: "string", i18n: true }
          - label: "Menu legenda"
            name: "menu_legend"
            widget: "list"
            i18n: true
            field: { label: "Item", name: "item", widget: "string" }
          - { label: "Keuken-disclaimer", name: "menu_kitchen_note", widget: "string", required: false, i18n: true }
          - { label: "Menu voettekst", name: "menu_footer_note", widget: "string", required: false, i18n: true }
          - { label: "Extra foto (optioneel)", name: "extra_image", widget: "image", required: false, i18n: duplicate }
        editor:
          preview: false

      - label: "Catering"
        name: "catering"
        file: "src/catering.njk"
        i18n: true
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "base.njk", i18n: duplicate }
          - { label: "Browser-titel", name: "title", widget: "string", i18n: true }
          - { label: "Meta description", name: "description", widget: "text", i18n: true }
          - { label: "Klein label", name: "hero_label", widget: "string", i18n: true }
          - { label: "Titel", name: "hero_title", widget: "string", i18n: true }
          - { label: "Intro tekst", name: "hero_intro", widget: "markdown", i18n: true }
          - label: "Chips (categorieën)"
            name: "chips"
            widget: "list"
            i18n: true
            field: { label: "Chip", name: "chip", widget: "string" }
          - label: "Galerij (sfeerimpressies)"
            name: "gallery"
            widget: "list"
            field: { label: "Foto", name: "image", widget: "image" }
          - { label: "Galerij-titel", name: "gallery_title", widget: "string", i18n: true }
          - { label: "Formuliertitel", name: "form_title", widget: "string", i18n: true }
          - { label: "Formulier intro", name: "form_intro", widget: "text", i18n: true }
        editor:
          preview: false

      - label: "Over Piment"
        name: "over-piment"
        file: "src/over-piment.njk"
        i18n: true
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "base.njk", i18n: duplicate }
          - { label: "Browser-titel", name: "title", widget: "string", i18n: true }
          - { label: "Meta description", name: "description", widget: "text", i18n: true }
          - { label: "Klein label", name: "hero_label", widget: "string", i18n: true }
          - { label: "Titel", name: "hero_title", widget: "string", i18n: true }
          - { label: "Intro citaat", name: "intro", widget: "text", i18n: true }
          - { label: "Sectie 1 — titel", name: "local_section_title", widget: "string", i18n: true }
          - { label: "Sectie 1 — tekst", name: "local_section_body", widget: "markdown", i18n: true }
          - { label: "Sectie 1 — foto", name: "local_section_image", widget: "image", i18n: duplicate }
          - { label: "Sectie 2 — titel (chef)", name: "chef_section_title", widget: "string", i18n: true }
          - { label: "Sectie 2 — tekst (chef)", name: "chef_section_body", widget: "markdown", i18n: true }
          - { label: "Sectie 2 — foto (chef)", name: "chef_section_image", widget: "image", i18n: duplicate }
          - { label: "Sectie 3 — titel (filosofie)", name: "philosophy_section_title", widget: "string", i18n: true }
          - { label: "Sectie 3 — tekst (filosofie)", name: "philosophy_section_body", widget: "markdown", i18n: true }
        editor:
          preview: false

      - label: "Vacatures (intro-tekst)"
        name: "vacatures-page"
        file: "src/vacatures.njk"
        i18n: true
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "base.njk", i18n: duplicate }
          - { label: "Browser-titel", name: "title", widget: "string", i18n: true }
          - { label: "Meta description", name: "description", widget: "text", i18n: true }
          - { label: "Klein label", name: "hero_label", widget: "string", i18n: true }
          - { label: "Titel", name: "hero_title", widget: "string", i18n: true }
          - { label: "Intro tekst", name: "hero_text", widget: "text", i18n: true }
          - { label: "Bericht als er geen vacatures zijn", name: "empty_text", widget: "text", i18n: true }
        editor:
          preview: false

      - label: "Contact"
        name: "contact"
        file: "src/contact.njk"
        i18n: true
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "base.njk", i18n: duplicate }
          - { label: "Browser-titel", name: "title", widget: "string", i18n: true }
          - { label: "Meta description", name: "description", widget: "text", i18n: true }
          - { label: "Klein label", name: "hero_label", widget: "string", i18n: true }
          - { label: "Titel", name: "hero_title", widget: "string", i18n: true }
          - { label: "Tekst onder titel", name: "hero_text", widget: "text", i18n: true }
          - { label: "Formuliertitel", name: "form_title", widget: "string", i18n: true }
          - { label: "Bevestigingsbericht", name: "success_message", widget: "string", i18n: true }
        editor:
          preview: false

      - label: "Privacyverklaring"
        name: "privacy"
        file: "src/privacyverklaring.njk"
        i18n: true
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "base.njk", i18n: duplicate }
          - { label: "Browser-titel", name: "title", widget: "string", i18n: true }
          - { label: "Meta description", name: "description", widget: "text", i18n: true }
          - { label: "Klein label", name: "hero_label", widget: "string", i18n: true }
          - { label: "Titel", name: "hero_title", widget: "string", i18n: true }
          - { label: "Laatst bijgewerkt op", name: "last_updated", widget: "string", required: false, i18n: true }
          - { label: "Inhoud", name: "body", widget: "markdown", i18n: true }
        editor:
          preview: false

  # ----------------------------------------------------------------------
  # Vacatures (één bestand per vacature)
  # ----------------------------------------------------------------------
  - name: "vacatures"
    label: "Vacatures"
    label_singular: "Vacature"
    folder: "src/_data/vacatures"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    i18n: true
    summary: "{{title.nl}}"
    fields:
      - { label: "Functietitel", name: "title", widget: "string", i18n: true }
      - { label: "Categorie (chip)", name: "category", widget: "string", required: false, i18n: true, hint: "bv. Keuken, Kitchen" }
      - { label: "Korte samenvatting", name: "summary", widget: "text", required: false, i18n: true }
      - { label: "Volledige omschrijving", name: "description", widget: "markdown", i18n: true }
      - { label: "Sollicitatie-instructie", name: "contact_text", widget: "string", required: false, i18n: true }

  # ----------------------------------------------------------------------
  # Lunch menu (één bestand per categorie)
  # ----------------------------------------------------------------------
  - name: "menu"
    label: "Lunchmenu"
    label_singular: "Menucategorie"
    folder: "src/_data/menu"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    i18n: true
    summary: "{{category.nl}}"
    fields:
      - { label: "Categorienaam (bv. Soep, Tosti)", name: "category", widget: "string", i18n: true }
      - label: "Gerechten"
        name: "items"
        widget: "list"
        i18n: true
        summary: "{{fields.name.nl}} – {{fields.price}}"
        fields:
          - { label: "Naam", name: "name", widget: "string", i18n: true }
          - { label: "Omschrijving", name: "description", widget: "text", required: false, i18n: true }
          - { label: "Prijs", name: "price", widget: "string", i18n: duplicate }

  # ----------------------------------------------------------------------
  # Reviews / Testimonials
  # ----------------------------------------------------------------------
  - name: "testimonials"
    label: "Reviews (homepage)"
    i18n: true
    files:
      - label: "Reviews"
        name: "testimonials"
        file: "src/_data/testimonials.json"
        i18n: true
        fields:
          - { label: "Sectietitel", name: "title", widget: "string", i18n: true }
          - label: "Reviews"
            name: "items"
            widget: "list"
            i18n: true
            summary: "{{fields.name}}"
            fields:
              - { label: "Naam", name: "name", widget: "string", i18n: duplicate }
              - { label: "Aantal sterren (1-5)", name: "rating", widget: "number", min: 1, max: 5, default: 5, i18n: duplicate }
              - { label: "Quote", name: "quote", widget: "text", i18n: true }
