backend:
  name: git-gateway
  branch: main

media_folder: "src/assets/images"
public_folder: "/assets/images"

# Vertaalbare velden gebruiken het object-widget met NL/EN sub-velden.
# Lange velden (text/markdown) zijn standaard ingeklapt om de editor overzichtelijk te houden.

collections:

  # ----------------------------------------------------------------------
  # Site-wide settings (logo, contact, address, navigation)
  # ----------------------------------------------------------------------
  - name: "settings"
    label: "Site-instellingen"
    files:
      - label: "Algemeen"
        name: "site"
        file: "src/_data/site.json"
        fields:
          - { label: "Sitenaam", name: "name", widget: "string" }

          - label: "Tagline (kort)"
            name: "tagline"
            widget: "object"
            fields:
              - { label: "Nederlands", name: "nl", widget: "string" }
              - { label: "English", name: "en", widget: "string" }

          - label: "Footer tekst"
            name: "footer_text"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Nederlands", name: "nl", widget: "text" }
              - { label: "English", name: "en", widget: "text" }

          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Telefoonnummer (zichtbaar)", name: "phone", widget: "string", hint: "bv. 06 1852 0544" }
              - { label: "Telefoonnummer (zonder spaties)", name: "phone_link", widget: "string", hint: "bv. 0618520544" }
              - { label: "E-mailadres", name: "email", widget: "string" }

          - label: "Adres lunchcafé"
            name: "lunchcafe_address"
            widget: "object"
            fields:
              - label: "Naam locatie"
                name: "name"
                widget: "object"
                fields:
                  - { label: "Nederlands", name: "nl", widget: "string" }
                  - { label: "English", name: "en", widget: "string" }
              - { label: "Locatie / landgoed", name: "location", widget: "string" }
              - { label: "Straat + huisnummer", name: "street", widget: "string" }
              - { label: "Plaats", name: "city", widget: "string" }
              - label: "Openingstijden"
                name: "hours"
                widget: "object"
                fields:
                  - { label: "Nederlands", name: "nl", widget: "string" }
                  - { label: "English", name: "en", widget: "string" }

          - label: "Postadres"
            name: "postal_address"
            widget: "object"
            fields:
              - { label: "Straat + huisnummer", name: "street", widget: "string" }
              - { label: "Postcode", name: "postcode", widget: "string" }
              - { label: "Plaats", name: "city", widget: "string" }

          - { label: "KvK-nummer", name: "kvk", widget: "string" }

          - label: "Social media (optioneel)"
            name: "social"
            widget: "object"
            fields:
              - { label: "Facebook URL", name: "facebook", widget: "string", required: false }
              - { label: "Instagram URL", name: "instagram", widget: "string", required: false }

          - label: "Navigatiemenu"
            name: "nav"
            widget: "list"
            summary: "{{fields.key}} → {{fields.url}}"
            hint: "De zichtbare tekst van de menu-items beheer je in de UI-vertalingen (vraag de developer)."
            fields:
              - { label: "Sleutel", name: "key", widget: "string", hint: "home, lunchcafe, catering, about, vacancies, contact" }
              - { label: "URL", name: "url", widget: "string", hint: "bv. /lunchcafe/" }

  # ----------------------------------------------------------------------
  # Pages
  # ----------------------------------------------------------------------
  - name: "pages"
    label: "Pagina's"
    format: "frontmatter"
    extension: "njk"
    files:

      - label: "Home"
        name: "home"
        file: "src/index.njk"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "base.njk" }

          - label: "Browser-titel"
            name: "title"
            widget: "object"
            fields:
              - { label: "Nederlands", name: "nl", widget: "string" }
              - { label: "English", name: "en", widget: "string" }

          - label: "Meta description"
            name: "description"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Nederlands", name: "nl", widget: "text" }
              - { label: "English", name: "en", widget: "text" }

          # --- Hero ---
          - label: "Hero — klein label"
            name: "hero_label"
            widget: "object"
            fields:
              - { label: "Nederlands", name: "nl", widget: "string" }
              - { label: "English", name: "en", widget: "string" }

          - label: "Hero — titel"
            name: "hero_title"
            widget: "object"
            fields:
              - { label: "Nederlands", name: "nl", widget: "string" }
              - { label: "English", name: "en", widget: "string" }

          - label: "Hero — tekst"
